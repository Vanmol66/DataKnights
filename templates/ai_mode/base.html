<!DOCTYPE html>
<html>
<head>
    <title>AI Mode</title>
    <div style="margin-left:auto;">
    <a href="/" style="color:#f87171;">Exit AI Mode</a>
</div>
    <style>
        body {
            background: #0b1220;
            color: #e5e7eb;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: #020617;
            border-bottom: 1px solid #1e293b;
        }

        .nav-left a {
            margin-right: 20px;
            text-decoration: none;
            color: #38bdf8;
            font-weight: 500;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 30px;
        }

        h1, h2 {
            margin-bottom: 15px;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px 18px;
            color: #000;
            border-radius: 6px;
            cursor: pointer;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 6px;
            border: none;
            margin-right: 10px;
        }

        pre {
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .nav-links a {
    margin: 0 10px;
    color: #38bdf8;
    text-decoration: none;
}

.nav-links a:hover {
    color: #22d3ee;
}
    </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-left">
        <span class="logo">⚡ AI Analyzer</span>
    </div>

    <div class="nav-links">
        <a href="/ai">Dashboard</a>
        <a href="/ai/insights">Insights</a>
        <a href="/ai/chat">Chat</a>
        <a href="/ai/report">Report</a>
    </div>

    <div class="nav-right">
        <a href="/" class="exit-btn">Exit AI Mode</a>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
